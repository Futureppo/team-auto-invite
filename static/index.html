<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT Team 邀请</title>
    <meta name="description" content="输入邮箱，获取 ChatGPT Team 席位邀请">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4efe7;
            --panel: rgba(255, 255, 255, 0.84);
            --line: rgba(89, 72, 55, 0.14);
            --text: #221c15;
            --muted: #7d7064;
            --primary: #3b3025;
            --primary-2: #241a12;
            --success: #1f7a50;
            --danger: #ae4133;
            --shadow: 0 24px 60px rgba(54, 40, 24, 0.14);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 20px;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top right, rgba(201, 123, 74, 0.16), transparent 24%),
                radial-gradient(circle at bottom left, rgba(89, 72, 55, 0.1), transparent 28%),
                linear-gradient(135deg, #f4efe7 0%, #efe7dc 100%);
        }

        .card {
            width: min(100%, 480px);
            padding: 42px 34px;
            border-radius: 28px;
            border: 1px solid var(--line);
            background: var(--panel);
            backdrop-filter: blur(18px);
            box-shadow: var(--shadow);
        }

        .topbar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 18px;
        }

        .ghost-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 999px;
            border: 1px solid var(--line);
            color: var(--primary);
            text-decoration: none;
            font-size: 12px;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.74);
        }

        .logo-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }

        .logo {
            width: 58px;
            height: 58px;
            border-radius: 18px;
            display: grid;
            place-items: center;
            background: linear-gradient(145deg, var(--primary) 0%, var(--primary-2) 100%);
            box-shadow: 0 10px 24px rgba(36, 26, 18, 0.28);
        }

        .logo svg {
            width: 30px;
            height: 30px;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 28px;
            letter-spacing: -0.04em;
        }

        .header p {
            margin-top: 10px;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.7;
        }

        .field {
            margin-bottom: 18px;
        }

        .field label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 700;
            color: #41372b;
        }

        .input {
            width: 100%;
            padding: 15px 16px;
            border: 1.5px solid rgba(89, 72, 55, 0.16);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.88);
            color: var(--text);
            font: inherit;
        }

        .input:focus {
            outline: none;
            border-color: rgba(201, 123, 74, 0.7);
            box-shadow: 0 0 0 4px rgba(201, 123, 74, 0.14);
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .button {
            border: none;
            border-radius: 16px;
            cursor: pointer;
            font: inherit;
            font-weight: 700;
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        }

        .button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .button-primary {
            flex: 1 1 180px;
            min-height: 50px;
            color: #fff;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-2) 100%);
            box-shadow: 0 10px 24px rgba(36, 26, 18, 0.26);
        }

        .button:hover:not(:disabled) {
            transform: translateY(-1px);
        }

        .spinner {
            display: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.24);
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }

        .button.loading .button-label {
            display: none;
        }

        .button.loading .spinner {
            display: inline-block;
        }

        .message {
            display: none;
            margin-top: 18px;
            padding: 13px 15px;
            border-radius: 14px;
            font-size: 13px;
            line-height: 1.6;
            border: 1px solid transparent;
        }

        .message.show {
            display: block;
        }

        .message.success {
            color: var(--success);
            background: rgba(31, 122, 80, 0.08);
            border-color: rgba(31, 122, 80, 0.15);
        }

        .message.error {
            color: var(--danger);
            background: rgba(174, 65, 51, 0.08);
            border-color: rgba(174, 65, 51, 0.15);
        }

        .footer-note {
            margin-top: 22px;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.8;
            text-align: center;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 520px) {
            .card {
                padding: 32px 20px;
            }

            .actions,
            .button-primary {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="topbar">
            <a class="ghost-link" href="/admin">进入管理后台</a>
        </div>

        <div class="logo-wrap">
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M22.282 9.821a5.985 5.985 0 0 0-.516-4.91 6.046 6.046 0 0 0-6.51-2.9A6.065 6.065 0 0 0 4.981 4.18a5.985 5.985 0 0 0-3.998 2.9 6.046 6.046 0 0 0 .743 7.097 5.98 5.98 0 0 0 .51 4.911 6.051 6.051 0 0 0 6.515 2.9A5.985 5.985 0 0 0 13.26 24a6.056 6.056 0 0 0 5.772-4.206 5.99 5.99 0 0 0 3.997-2.9 6.056 6.056 0 0 0-.747-7.073zM13.26 22.43a4.476 4.476 0 0 1-2.876-1.04l.141-.081 4.779-2.758a.795.795 0 0 0 .392-.681v-6.737l2.02 1.168a.071.071 0 0 1 .038.052v5.583a4.504 4.504 0 0 1-4.494 4.494zM3.6 18.304a4.47 4.47 0 0 1-.535-3.014l.142.085 4.783 2.759a.771.771 0 0 0 .78 0l5.843-3.369v2.332a.08.08 0 0 1-.033.062L9.74 19.95a4.5 4.5 0 0 1-6.14-1.646zM2.34 7.896a4.485 4.485 0 0 1 2.366-1.973V11.6a.766.766 0 0 0 .388.676l5.815 3.355-2.02 1.168a.076.076 0 0 1-.071.005l-4.83-2.786A4.504 4.504 0 0 1 2.34 7.872zm16.597 3.855L13.1 8.364l2.02-1.166a.076.076 0 0 1 .071-.006l4.83 2.786a4.494 4.494 0 0 1-.676 8.105v-5.678a.79.79 0 0 0-.407-.654zm2.01-3.028l-.141-.085-4.774-2.782a.776.776 0 0 0-.785 0L9.409 9.23V6.897a.066.066 0 0 1 .028-.061l4.83-2.787a4.5 4.5 0 0 1 6.68 4.66zm-12.64 4.135l-2.02-1.164a.08.08 0 0 1-.038-.057V6.085a4.499 4.499 0 0 1 7.37-3.456l-.14.08-4.78 2.758a.795.795 0 0 0-.392.681zm1.097-2.365l2.602-1.5 2.607 1.5v3.005l-2.602 1.5-2.607-1.5z"
                        fill="white" />
                </svg>
            </div>
        </div>

        <div class="header">
            <h1>ChatGPT Team</h1>
            <p>输入邮箱发送邀请。</p>
        </div>

        <form id="inviteForm">
            <div class="field">
                <label for="emailInput">邮箱地址</label>
                <input class="input" type="email" id="emailInput" name="email" placeholder="your@email.com" required
                    autocomplete="email" autofocus>
            </div>

            <div class="actions">
                <button type="submit" class="button button-primary" id="inviteButton">
                    <span class="button-label">发送邀请</span>
                    <span class="spinner"></span>
                </button>
            </div>
        </form>

        <div id="inviteMessage" class="message"></div>

        <div class="footer-note">
            邀请成功后请注意查收邮箱。后台 token 管理已移到独立页面。
        </div>
    </div>

    <script>
        function showMessage(text, type) {
            const element = document.getElementById('inviteMessage');
            element.textContent = text;
            element.className = `message show ${type}`;
        }

        function hideMessage() {
            const element = document.getElementById('inviteMessage');
            element.className = 'message';
            element.textContent = '';
        }

        function setButtonLoading(loading) {
            const button = document.getElementById('inviteButton');
            button.disabled = loading;
            button.classList.toggle('loading', loading);
        }

        async function requestJson(url, options = {}) {
            const response = await fetch(url, options);
            const data = await response.json().catch(() => ({}));

            if (!response.ok) {
                throw new Error(data.message || '请求失败');
            }

            return data;
        }

        async function handleInviteSubmit(event) {
            event.preventDefault();
            hideMessage();

            const email = document.getElementById('emailInput').value.trim();
            if (!email) {
                return;
            }

            setButtonLoading(true);

            try {
                const data = await requestJson('/api/invite', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email }),
                });
                showMessage(data.message, 'success');
                document.getElementById('emailInput').value = '';
            } catch (error) {
                showMessage(error.message || '邀请失败', 'error');
            } finally {
                setButtonLoading(false);
            }
        }

        document.getElementById('inviteForm').addEventListener('submit', handleInviteSubmit);
    </script>
</body>

</html>
